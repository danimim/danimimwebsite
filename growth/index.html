<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/growth/growth.css">

    <!-- FAVICON -->
    <link rel="icon" type="image/x-icon" href="/favicon.png">

<body>
    <!-- Aero atmosphere: sky + aurora ribbons + bokeh -->
    <div class="aero-sky" aria-hidden="true">
        <div class="aero-aurora aurora-1"></div>
        <div class="aero-aurora aurora-2"></div>
        <div class="aero-aurora aurora-3"></div>
        <div class="aero-bokeh">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>

        <div class="desktop-icons">
            <button class="desktop-icon" data-window="about" aria-label="About this page">
                <img src="/icons/growth-about.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#127759;</span>'">
                <span>About</span>
            </button>

            <button class="desktop-icon" data-window="articles" aria-label="Articles">
                <img src="/icons/growth-articles.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#128218;</span>'">
                <span>Articles</span>
            </button>

            <button class="desktop-icon" data-window="article-gtm" aria-label="GTM Engineering guide">
                <img src="/icons/growth-gtm.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#128202;</span>'">
                <span>GTM Engineering</span>
            </button>

            <button class="desktop-icon" data-window="resources" aria-label="Resources">
                <img src="/icons/growth-resources.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#128194;</span>'">
                <span>Resources</span>
            </button>

            <button class="desktop-icon" data-window="toolstack" aria-label="Tools">
                <img src="/icons/growth-tools.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#9881;&#65039;</span>'">
                <span>Tool stack</span>
            </button>
        </div>

        <!-- Side icons (right side, highlighted call-to-action) -->
        <div class="side-icons">
            <button class="desktop-icon side" data-window="donate" aria-label="Donate">
                <img src="/icons/growth-donate.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#129534;</span>'">
                <span>Donate</span>
            </button>

            <a class="desktop-icon side" href="/" aria-label="Back to danimim.xyz">
                <img src="/favicon.png" alt="" width="80" height="80" onerror="this.outerHTML='<span class=icon-fallback aria-hidden=true>&#127968;</span>'">
                <span>danimim.xyz</span>
            </a>
        </div>

    <div class="window" id="about" role="dialog" aria-labelledby="about-title">
        <div class="window-header">
            <span id="about-title">About — Growth</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>
                <button class="window-btn close" aria-label="Close"><span>&#10005;</span></button>
            </div>
        </div>
        <div class="window-content">
            <div id="about-content"></div>
        </div>
    </div>

    <!-- Articles Window -->
    <div class="window" id="articles" role="dialog" aria-labelledby="articles-title">
        <div class="window-header">
            <span id="articles-title">Articles</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>
                <button class="window-btn close" aria-label="Close"><span>&#10005;</span></button>
            </div>
        </div>
        <div class="window-content">
            <div id="articles-content"></div>
        </div>
    </div>

    <div class="window window-wide" id="article-gtm" role="dialog" aria-labelledby="article-gtm-title">

            <span id="article-gtm-title">How I'm learning GTM Engineering while job-hunting</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>

            <span id="resources-title">Resources</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>
                <button class="window-btn close" aria-label="Close"><span>&#10005;</span></button>
            </div>
        </div>
        <div class="window-content">
            <div id="resources-content"></div>
        </div>
    </div>

    <div class="window" id="toolstack" role="dialog" aria-labelledby="toolstack-title">

            <span id="toolstack-title">Tool stack</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>
                <button class="window-btn close" aria-label="Close"><span>&#10005;</span></button>

        </div>
        <div class="window-content">
            <div id="toolstack-content"></div>
        </div>
    </div>

    <!-- Donate Window -->
    <div class="window" id="donate" role="dialog" aria-labelledby="donate-title">
        <div class="window-header">
            <span id="donate-title">Donate — Support more writing</span>
            <div class="window-controls">
                <button class="window-btn minimize" aria-label="Minimize"><span>&#9472;</span></button>
                <button class="window-btn close" aria-label="Close"><span>&#10005;</span></button>
            </div>
        </div>
        <div class="window-content">
            <div id="donate-content"></div>
        </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
        <button class="start-button" id="start-btn" aria-label="Start menu">
            <span class="start-orb" aria-hidden="true"></span>
        </button>

        <!-- Start Menu -->
        <div class="start-menu" id="start-menu">
            <div class="start-menu-header">
                <div class="start-menu-avatar" aria-hidden="true">&#127759;</div>
                <div class="start-menu-name">Growth lab<br><small>danimim.xyz</small></div>
            </div>
            <div class="start-menu-items">
                <button class="start-menu-item" data-window="about">
                    <span class="menu-icon"><img src="/icons/growth-about.png" alt="" width="32" height="32" onerror="this.outerHTML='&#127759;'"></span>
                    <span>About</span>
                </button>
                <button class="start-menu-item" data-window="articles">
                    <span class="menu-icon"><img src="/icons/growth-articles.png" alt="" width="32" height="32" onerror="this.outerHTML='&#128218;'"></span>
                    <span>Articles</span>
                </button>
                <button class="start-menu-item" data-window="article-gtm">

                </button>

                </button>
                <button class="start-menu-item start-menu-accent" data-window="donate">
                    <span class="menu-icon"><img src="/icons/growth-donate.png" alt="" width="32" height="32" onerror="this.outerHTML='&#129534;'"></span>
                    <span>Donate</span>
                </button>
            </div>
            <a class="start-menu-back" href="/">
                <span aria-hidden="true">&#8629;</span> Back to danimim.xyz
            </a>
        </div>

        <div class="taskbar-clock" id="clock"></div>
    </div>

    <!-- Scripts -->
    <script src="/assets/js/data.js"></script>
    <script src="/growth/growth.js"></script>

</html>
